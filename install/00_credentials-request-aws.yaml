---
apiVersion: cloudcredential.openshift.io/v1
kind: CredentialsRequest
metadata:
  name: karpenter-cloud-credentials
  namespace: openshift-cloud-credential-operator
  annotations:
    capability.openshift.io/name: CloudCredential
    exclude.release.openshift.io/internal-openshift-hosted: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
spec:
  serviceAccountNames:
    - karpenter
  secretRef:
    name: karpenter-cloud-credentials
    namespace: openshift-karpenter
  providerSpec:
    apiVersion: cloudcredential.openshift.io/v1
    kind: AWSProviderSpec
    statementEntries:
      # EC2 instance lifecycle (RunInstances, CreateFleet, Terminate, LaunchTemplates)
      - effect: Allow
        action:
          - ec2:RunInstances
          - ec2:CreateFleet
          - ec2:CreateLaunchTemplate
          - ec2:TerminateInstances
          - ec2:DeleteLaunchTemplate
          - ec2:CreateTags
        resource: "*"
      # EC2 read-only resource discovery
      - effect: Allow
        action:
          - ec2:DescribeCapacityReservations
          - ec2:DescribeImages
          - ec2:DescribeInstances
          - ec2:DescribeInstanceTypeOfferings
          - ec2:DescribeInstanceTypes
          - ec2:DescribeLaunchTemplates
          - ec2:DescribeSecurityGroups
          - ec2:DescribeSpotPriceHistory
          - ec2:DescribeSubnets
          - ec2:DescribeAvailabilityZones
        resource: "*"
      # IAM instance profile management
      - effect: Allow
        action:
          - iam:CreateInstanceProfile
          - iam:DeleteInstanceProfile
          - iam:AddRoleToInstanceProfile
          - iam:RemoveRoleFromInstanceProfile
          - iam:TagInstanceProfile
          - iam:GetInstanceProfile
          - iam:ListInstanceProfiles
          - iam:PassRole
        resource: "*"
      # SSM parameter read (AMI discovery)
      - effect: Allow
        action:
          - ssm:GetParameter
        resource: "*"
      # Pricing (instance type pricing discovery)
      - effect: Allow
        action:
          - pricing:GetProducts
        resource: "*"
